<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil GitHub</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Nunito', sans-serif;
    }

    body {
      background: teal;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      padding: 30px;
      border-radius: 20px;
      width: 320px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 20%;
      margin-bottom: 15px;
      object-fit: cover;
      border: 1px solid #667eea;
    }

    h2 {
      font-size: 20px;
      margin-bottom: 5px;
    }

    p {
      font-size: 14px;
      color: #666;
      margin-bottom: 20px;
    }

    .socials {
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .socials a {
      background: #f1f1f1;
      padding: 10px;
      border-radius: 50%;
      transition: 0.3s;
      color: #333;
    }

    .socials a:hover {
      background: #667eea;
      color: #fff;
    }
  </style>
</head>
<body>

  <div class="card">
    <img src="me.jpg" class="avatar" alt="avatar">

    <h2>AUQI</h2>
    <p>INTEGRATED WITH IMAGINATION</p>
    <h3>SOURCE NO PAGE</h3>
    <p>CODE : 404</p>

    

  <script>
    lucide.createIcons();
  </script>

</body>
</html>
